prefix: "&6[PulseEvents] "

command:
  usage: "&eUse: &f/pe help"
  unknown: "&cUnknown subcommand."
  no-permission: "&cYou do not have permission to use this command."
  help:
    header: "&eAvailable PulseEvents commands:"
    line-help: "&6/pe help &7- Show all plugin commands"
    line-start: "&6/pe start &7- Start a random event immediately"
    line-stop: "&6/pe stop &7- Stop the current event"
    line-status: "&6/pe status &7- Show the current event status"
    line-reload: "&6/pe reload &7- Reload config and language files"
    line-update: "&6/pe update &7- Check for a new plugin version"
  start:
    success: "&aA random event has been started."
    failed: "&cThe event could not be started. Make sure players are online."
    no-events: "&cNo events are registered."
    already-running: "&cAn event is already running: &f%event%&c."
  stop:
    success: "&cStopped event: &f%event%"
    no-event: "&cThere is no active event to stop."
  status:
    running: "&aCurrent event: &f%event%"
    idle: "&eNo event is active right now."
  reload:
    success: "&aConfiguration and language files reloaded. Active language: &f%language%&a."
  update:
    checking: "&7Checking GitHub for the latest release..."

announcement:
  starting-in: "&eThe next event starts in &c%time% &eminute(s)."

event:
  start: "&eEvent started: &b%event%"
