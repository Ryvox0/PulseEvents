events:
  low-gravity:
    name: "Low Gravity"
  coin-rain:
    name: "Coin Rain"
  lightning-storm:
    name: "Lightning Storm"
  tnt-rain:
    name: "TNT Rain"
  mob-swarm:
    name: "Mob Swarm"
  random-teleport:
    name: "Random Teleport"
  fire-feet:
    name: "Fire Feet"
  freeze:
    name: "Freeze"
  reverse-controls:
    name: "Reverse Controls"
  black-hole:
    name: "Black Hole"
  random-effects:
    name: "Random Effects"
  target-player:
    name: "Target Player"
  spin:
    name: "Spin"

bossbar:
  title: "&9Pulse Event: &f%event%"

milk-blocked: "&cYou cannot use milk during an active event."

